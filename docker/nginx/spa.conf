server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — toutes les routes inconnues → index.html (Vue Router)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Assets statiques avec cache long
  location ~* \.(js|css|png|jpg|jpeg|webp|svg|woff2|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  gzip_static on;
}
