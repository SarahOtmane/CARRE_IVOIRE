# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# With back-office: --profile back-office
# With nginx:       --profile nginx

services:
  database:
    ports:
      - "3307:3306"

  backend:
    build:
      context: ./apps/api
      target: development
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/package.json:/app/package.json
      - ./packages:/app/packages
      - node_modules_api:/app/node_modules
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    command: npm run start:dev
    depends_on:
      database:
        condition: service_healthy

  front-office:
    build:
      context: ./apps/front-office
      target: development
    volumes:
      - ./apps/front-office/src:/app/src
      - ./apps/front-office/public:/app/public
      - ./packages:/app/packages
      - node_modules_front:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-pk_test_xxx}
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    depends_on:
      - backend
    healthcheck:
      disable: true

  back-office:
    build:
      context: ./apps/back-office
      target: development
    volumes:
      - ./apps/back-office/src:/app/src
      - ./packages:/app/packages
      - node_modules_back:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-pk_test_xxx}
    ports:
      - "5174:5174"
    command: npm run dev -- --host
    depends_on:
      - backend
    healthcheck:
      disable: true

  nginx:
    profiles:
      - nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - front-office
