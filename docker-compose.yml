version: "3.9"

networks:
  carre_ivoire_network:
    driver: bridge

volumes:
  mysql_data:

services:
  database:
    image: mysql:8.0
    container_name: carre_ivoire_db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-carre_ivoire}
      MYSQL_USER: ${DB_USER:-carre_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme_root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - carre_ivoire_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_ROOT_PASSWORD:-changeme_root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  backend:
    container_name: carre_ivoire_backend
    build:
      context: ./apps/api
    env_file:
      - .env
    networks:
      - carre_ivoire_network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  front-office:
    container_name: carre_ivoire_front
    build:
      context: ./apps/front-office
    networks:
      - carre_ivoire_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  back-office:
    container_name: carre_ivoire_back_office
    build:
      context: ./apps/back-office
    profiles:
      - back-office
    networks:
      - carre_ivoire_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
